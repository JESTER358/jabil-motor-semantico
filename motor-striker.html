<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {

  --card:    #132433;

  --border:  #1e3a52;
  --text:    #c8d6e0;
  --text-muted: #6a8a9a;

html,body{height:100%;}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);display:flex;flex-direction:column;min-height:100vh;}
.site-header{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;gap:16px;padding:10px 28px;max-width:1440px;margin:0 auto;width:100%;border-bottom:2px solid var(--navy-lt);}
.header-titles{flex:1;}
.header-titles h1{font-size:18px;font-weight:700;letter-spacing:0.02em;line-height:1.2;color:#fff;}
.header-titles p{font-size:11px;color:var(--blue-lt);margin-top:2px;text-transform:uppercase;letter-spacing:0.04em;}
main{display:grid;grid-template-columns:1fr 340px;gap:1.5rem;padding:1.5rem;max-width:1440px;margin:0 auto;width:100%;flex:1;overflow-y:auto;}
@media(max-width:1024px){main{grid-template-columns:1fr;}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.3rem;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
.panel-title{font-size:0.75rem;font-weight:600;color:var(--blue);margin-bottom:0.9rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.5px;}
.form-group{margin-bottom:1.1rem;}
label{display:block;font-size:0.72rem;font-weight:500;color:var(--text-muted);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.3px;}
select,input,textarea{width:100%;padding:0.6rem 0.8rem;border:1px solid var(--border);border-radius:5px;background:var(--navy-dk);color:var(--text);font-size:0.9rem;font-family:inherit;transition:border-color 0.15s ease-out,box-shadow 0.15s ease-out,background-color 0.15s ease-out;}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(96,152,176,0.15);}
select option{background:var(--navy);color:var(--text);}
button{width:100%;padding:0.65rem 1.2rem;background:linear-gradient(135deg,var(--blue) 0%,var(--navy-lt) 100%);color:#fff;border:none;border-radius:5px;font-weight:600;cursor:pointer;transition:all 0.2s;font-size:0.88rem;}
button:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(96,152,176,0.25);}
button:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
.match-item{background:var(--navy-dk);border:1px solid var(--border);border-radius:5px;padding:0.8rem;margin-bottom:0.5rem;cursor:pointer;transition:background-color 0.15s ease-out,border-color 0.15s ease-out;}
.match-item:hover{background:var(--card-hl);border-color:var(--blue);}
.match-item.selected{background:var(--blue);border-color:var(--blue);}
.match-code{font-weight:600;color:var(--blue);font-family:monospace;font-size:1.05rem;}
.match-item.selected .match-code{color:#fff;}
.match-causa{font-size:0.82rem;color:var(--text);margin-top:0.2rem;}
.match-item.selected .match-causa{color:#fff;}
.match-accion{font-size:0.76rem;color:var(--text-muted);margin-top:0.15rem;}
.match-accion.pendiente{opacity:0.55;font-style:italic;}
.match-item.selected .match-accion{color:#e0e8f0;}
.match-meta{font-size:0.7rem;color:var(--text-muted);margin-top:0.25rem;text-transform:uppercase;letter-spacing:0.3px;}
.match-item.selected .match-meta{color:#e0e8f0;}
.match-conf{font-size:0.72rem;margin-top:0.15rem;}
.match-item.selected .match-conf{color:#e0e8f0;}
.info-box{background:var(--navy-dk);border-radius:5px;padding:1rem;min-height:80px;display:flex;flex-direction:column;justify-content:center;}
.info-code{font-size:1.4rem;font-weight:600;color:var(--blue);font-family:monospace;}
.info-desc{color:var(--text-muted);font-size:0.85rem;margin-top:0.3rem;}
.info-conf{font-size:0.8rem;margin-top:0.3rem;}
.conf-high{color:var(--success);}
.conf-med{color:var(--warn);}
.conf-low{color:var(--danger);}
.info-placeholder{color:var(--text-muted);font-size:0.85rem;text-align:center;}
.hist-item{background:var(--navy-dk);border-left:3px solid var(--blue);padding:0.55rem 0.7rem;margin-bottom:0.45rem;border-radius:2px;font-size:0.85rem;}
.hist-code{font-weight:600;color:var(--blue);font-family:monospace;font-size:0.9rem;}
.hist-text{color:var(--text-muted);font-size:0.78rem;margin-top:0.1rem;}
.hist-meta{color:var(--text-muted);font-size:0.68rem;margin-top:0.1rem;opacity:0.7;}
footer{text-align:center;padding:0.7rem 2rem;font-size:0.7rem;color:var(--text-muted);border-top:1px solid var(--border);opacity:0.7;}
.header-client{text-align:right;}
aside.sidebar{display:flex;flex-direction:column;gap:1rem;}
.panel-section{margin-top:1.5rem;}
.suggestions-container{min-height:70px;}
.info-selected{padding:1.5rem;}
</style>
</head>

  "BSN SELLADO PARCIAL":["bsn sellado parcial","falla bsn sellado parcial","error bsn sellado parcial","scrap por sellado parcial bsn","problema bsn","falla en bsn","branson bsn sellado parcial"],
  "BSN SOBRESELLADO":["bsn sobresellado","falla bsn sobresellado","error bsn sobresellado","scrap por sobresellado bsn sobresellado","problema bsn","falla en bsn","branson bsn sobresellado"]
};

const SCORE_EXACTA  = 100;
const SCORE_PARCIAL = 75;
const SCORE_FUZZY   = 50;
const TOP_N         = 3;
const MIN_INPUT     = 2;
const MAX_HISTORIAL = 10;

const normalizar = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

const INDICE = Object.entries(DATOS).flatMap(([modulo, items]) =>
  items.map(item => ({
    ...item,
    modulo,
    eqsNorm: (EQS[item.codigo] || []).map(normalizar),
    causaNorm: normalizar(item.causa),
    modoNorm: normalizar(item.modo)
  }))
);

let historial = [];
let seleccion = null;

document.getElementById('selModulo').addEventListener('change', onModuloChange);
document.getElementById('txtDesc').addEventListener('input', onDescChange);
document.getElementById('btnGuardar').addEventListener('click', guardar);

document.addEventListener('click', e => {
  const matchItem = e.target.closest('.match-item');
  if (!matchItem) return;
  seleccionarCodigo(matchItem.dataset.codigo, parseInt(matchItem.dataset.score));
});

const getConfidenceLevel = score => score >= 85 ? 'high' : score >= 60 ? 'med' : 'low';

function onModuloChange() {
  document.getElementById('txtDesc').value = '';
  document.getElementById('sugerencias').innerHTML = '';
  clearSelection();
}

function onDescChange() {
  const input = normalizar(document.getElementById('txtDesc').value.trim());
  const modulo = document.getElementById('selModulo').value;
  if (input.length < MIN_INPUT) {
    document.getElementById('sugerencias').innerHTML = '';
    return;
  }
  buscar(input, modulo);
}

function buscar(input, modulo) {
  const candidatos = modulo ? INDICE.filter(c => c.modulo === modulo) : INDICE;
  const inputWords = input.split(/\s+/).filter(w => w.length >= MIN_INPUT);
  const scores = [];

  candidatos.forEach(item => {
    let score = 0;
    let matched = 0;

    if (item.eqsNorm.some(eq => eq === input)) {
      score = SCORE_EXACTA;
      matched = inputWords.length;
    } else {
      matched = inputWords.filter(w =>
        item.eqsNorm.some(eq => eq.split(' ').some(e => e.includes(w)))
      ).length;
      if (matched > 0) {
        score = SCORE_PARCIAL;
      } else if (item.causaNorm.includes(input) || item.modoNorm.includes(input)) {
        score = SCORE_FUZZY;
      }
    }

    if (score > 0) scores.push({ ...item, score, matched });
  });

  scores.sort((a, b) => b.score - a.score || b.matched - a.matched || a.codigo.localeCompare(b.codigo));
  mostrar(scores.slice(0, TOP_N));
}

function mostrar(matches) {
  const container = document.getElementById('sugerencias');
  if (!matches.length) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">Sin coincidencias</div>';
    return;
  }
  container.innerHTML = matches.map(entry => {
    const confidenceLevel = getConfidenceLevel(entry.score);
    const accionHtml = entry.accion
      ? `<div class="match-accion">${entry.accion}</div>`
      : '<div class="match-accion pendiente">accion correctiva: pendiente de definir</div>';
    return `<div class="match-item" data-codigo="${entry.codigo}" data-score="${entry.score}">
      <div class="match-code">${entry.codigo}</div>
      <div class="match-causa">${entry.causa}</div>
      ${accionHtml}
      <div class="match-meta">${entry.modulo}</div>
      <div class="match-conf conf-${confidenceLevel}">${entry.score}% confianza</div>
    </div>`;
  }).join('');
}

function seleccionarCodigo(codigo, score) {
  const item = INDICE.find(c => c.codigo === codigo);
  if (!item) return;
  seleccion = { codigo, causa: item.causa, modulo: item.modulo, score };
  document.getElementById('btnGuardar').disabled = false;
  const confidenceLevel = getConfidenceLevel(score);
  document.getElementById('infoBox').innerHTML =
    `<div class="info-code">${codigo}</div>
     <div class="info-desc">${item.causa}</div>
     <div class="info-desc">${item.modulo}</div>
     <div class="info-conf conf-${confidenceLevel}">${score}% confianza</div>`;
}

function clearSelection() {
  seleccion = null;
  document.getElementById('btnGuardar').disabled = true;
  document.getElementById('infoBox').innerHTML =
    '<div class="info-placeholder info-selected">Selecciona una sugerencia</div>';
}

function guardar() {
  if (!seleccion) return;
  const desc = document.getElementById('txtDesc').value;
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  historial.unshift({ codigo: seleccion.codigo, desc, score: seleccion.score, modulo: seleccion.modulo, time: ts });
  if (historial.length > MAX_HISTORIAL) historial = historial.slice(0, MAX_HISTORIAL);
  actualizarHist();
  document.getElementById('txtDesc').value = '';
  document.getElementById('sugerencias').innerHTML = '';
  clearSelection();
}

function actualizarHist() {
  const container = document.getElementById('historial');
  if (!historial.length) {
    container.innerHTML = '<div class="info-placeholder" style="padding:1rem;">Sin capturas</div>';
    return;
  }
  container.innerHTML = historial.map(h =>
    `<div class="hist-item">
       <div class="hist-code">${h.codigo}</div>
       <div class="hist-text">"${h.desc}" [${h.modulo}]</div>
       <div class="hist-meta">${h.time} | ${h.score}% confianza</div>
     </div>`
  ).join('');
}
</script>
</body>
</html>
