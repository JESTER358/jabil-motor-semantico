<title>Motor Semantico | Jabil Tijuana</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --navy:    #002C49;
  --navy-dk: #001a2e;
  --navy-lt: #003a5c;
  --blue:    #6098B0;
  --blue-lt: #7ab1c8;
  --bg:      #0d1a26;
  --card:    #132433;
  --card-hl: #1a2d40;
  --border:  #1e3a52;
  --text:    #c8d6e0;
  --text-muted: #6a8a9a;
  --font:    'Segoe UI', system-ui, -apple-system, sans-serif;
  --success: #2ecc71;
  --warn:    #f39c12;
  --danger:  #e74c3c;
}
html,body{height:100%;}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);display:flex;flex-direction:column;min-height:100vh;}
.site-header{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;gap:16px;padding:10px 28px;max-width:1440px;margin:0 auto;width:100%;border-bottom:2px solid var(--navy-lt);}
.header-titles{flex:1;}
.header-titles h1{font-size:18px;font-weight:700;letter-spacing:0.02em;line-height:1.2;color:#fff;}
.header-titles p{font-size:11px;color:var(--blue-lt);margin-top:2px;text-transform:uppercase;letter-spacing:0.04em;}
.header-cliente-sel{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.header-cliente-sel label{font-size:10px;color:var(--blue-lt);text-transform:uppercase;letter-spacing:0.04em;}
.sel-cliente{background:var(--navy-lt);color:#fff;border:1px solid var(--blue);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;width:auto;min-width:120px;transition:border-color 0.15s;}
.sel-cliente:focus{outline:none;border-color:var(--blue-lt);box-shadow:0 0 0 2px rgba(96,152,176,0.2);}
.sel-cliente option{background:var(--navy);color:var(--text);}
main{display:grid;grid-template-columns:1fr 340px;gap:1.5rem;padding:1.5rem;max-width:1440px;margin:0 auto;width:100%;flex:1;overflow-y:auto;}
@media(max-width:1024px){main{grid-template-columns:1fr;}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.3rem;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
.panel-title{font-size:0.75rem;font-weight:600;color:var(--blue);margin-bottom:0.9rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.5px;}
.form-group{margin-bottom:1.1rem;}
label{display:block;font-size:0.72rem;font-weight:500;color:var(--text-muted);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.3px;}
select,input,textarea{width:100%;padding:0.6rem 0.8rem;border:1px solid var(--border);border-radius:5px;background:var(--navy-dk);color:var(--text);font-size:0.9rem;font-family:inherit;transition:border-color 0.15s ease-out,box-shadow 0.15s ease-out,background-color 0.15s ease-out;}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(96,152,176,0.15);}
select option{background:var(--navy);color:var(--text);}
button{width:100%;padding:0.65rem 1.2rem;background:linear-gradient(135deg,var(--blue) 0%,var(--navy-lt) 100%);color:#fff;border:none;border-radius:5px;font-weight:600;cursor:pointer;transition:all 0.2s;font-size:0.88rem;}
button:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(96,152,176,0.25);}
button:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
.match-item{background:var(--navy-dk);border:1px solid var(--border);border-radius:5px;padding:0.8rem;margin-bottom:0.5rem;cursor:pointer;transition:background-color 0.15s ease-out,border-color 0.15s ease-out;}
.match-item:hover{background:var(--card-hl);border-color:var(--blue);}
.match-item.selected{background:var(--blue);border-color:var(--blue);}
.match-code{font-weight:600;color:var(--blue);font-family:monospace;font-size:1.0rem;}
.match-item.selected .match-code{color:#fff;}
.match-desc{font-size:0.78rem;color:var(--text-muted);margin-top:0.15rem;}
.match-causa{font-size:0.82rem;color:var(--text);margin-top:0.2rem;}
.match-accion{font-size:0.76rem;color:var(--text-muted);margin-top:0.15rem;}
.match-accion.pendiente{opacity:0.55;font-style:italic;}
.match-meta{font-size:0.7rem;color:var(--text-muted);margin-top:0.25rem;text-transform:uppercase;letter-spacing:0.3px;}
.match-conf{font-size:0.72rem;margin-top:0.15rem;}
.match-item.selected .match-desc,.match-item.selected .match-causa,.match-item.selected .match-accion,.match-item.selected .match-meta,.match-item.selected .match-conf{color:#e0e8f0;}
.info-code{font-size:1.4rem;font-weight:600;color:var(--blue);font-family:monospace;}
.info-desc{color:var(--text-muted);font-size:0.85rem;margin-top:0.3rem;}
.info-conf{font-size:0.8rem;margin-top:0.3rem;}
.conf-high{color:var(--success);}
.conf-med{color:var(--warn);}
.conf-low{color:var(--danger);}
.info-placeholder{color:var(--text-muted);font-size:0.85rem;text-align:center;}
.hist-item{background:var(--navy-dk);border-left:3px solid var(--blue);padding:0.55rem 0.7rem;margin-bottom:0.45rem;border-radius:2px;font-size:0.85rem;}
.hist-code{font-weight:600;color:var(--blue);font-family:monospace;font-size:0.9rem;}
.hist-text{color:var(--text-muted);font-size:0.78rem;margin-top:0.1rem;}
.hist-meta{color:var(--text-muted);font-size:0.68rem;margin-top:0.1rem;opacity:0.7;}
footer{text-align:center;padding:0.7rem 2rem;font-size:0.7rem;color:var(--text-muted);border-top:1px solid var(--border);opacity:0.7;}
aside.sidebar{display:flex;flex-direction:column;gap:1rem;}
.panel-section{margin-top:1.5rem;}
.suggestions-container{min-height:70px;}
.info-selected{padding:1.5rem;}
</style>
</head>

<header class="site-header">
  <div class="header-inner">
    <div class="header-titles">
      <h1 id="tituloMotor">MOTOR SEMANTICO — DEXCOM</h1>
      <p>Estandarizacion de Codigos de Downtime | Jabil Tijuana</p>
    </div>
    <div class="header-cliente-sel">
      <label for="sel-cliente">Cliente</label>

    </div>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-title">Filtros</div>

    <div class="form-group">
      <label id="labelGrupo">Linea</label>
      <select id="selGrupo">

      </select>
    </div>

    <div class="panel-title panel-section">Descripcion del Error</div>

    <div class="form-group">
      <label>Describe lo que observaste</label>
      <textarea id="txtDesc" rows="3" placeholder="Ej: atoramiento, sensor falla, conveyor parado"></textarea>
    </div>

    <div class="panel-title panel-section">Sugerencias</div>
    <div id="sugerencias" class="suggestions-container"></div>

    <button class="panel-section" id="btnGuardar" disabled>Guardar</button>
  </div>

  <aside class="sidebar">
    <div class="panel">
      <div class="panel-title">Codigo Seleccionado</div>
      <div id="infoBox" class="info-placeholder info-selected">Selecciona una sugerencia</div>
    </div>

    <div class="panel">
      <div class="panel-title">Historial</div>
      <div id="historial" style="max-height:280px;overflow-y:auto;">
        <div class="info-placeholder" style="padding:1rem;">Sin capturas</div>
      </div>
    </div>
  </aside>
</main>

<footer id="footerMotor">Motor Semantico | Jabil 2026</footer>

  STRIKER: { label: 'STRIKER', datos: DATOS_STRIKER, eqs: EQS_STRIKER, tipoGrupo: 'Modulo', campoId: 'codigo', campoDesc: 'causa', promptPlaceholder: 'Ej: atoramiento en nido, fuga en estacion 2, sensor danado', totalCodigos: 43 },
};

//constantes scoring
const SCORE_EXACTA  = 100;
const SCORE_PARCIAL = 75;
const SCORE_FUZZY   = 50;
const TOP_N         = 3;
const MIN_INPUT     = 2;
const MAX_HISTORIAL = 10;

//estado global
let clienteActivo = 'DEXCOM';
let historial = [];
let seleccion = null;

//normaliza texto: minusculas, sin acentos ni enie
const normalizar = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/ñ/g, 'n');

//indice plano precalculado por cliente
function construirIndice(cliente) {
  const cfg = CLIENTES[cliente];
  return Object.entries(cfg.datos).flatMap(([grupo, items]) =>
    items.map(item => ({
      ...item,
      _grupo: grupo,
      _id: item[cfg.campoId],
      _desc: item[cfg.campoDesc] || '',
      eqsNorm: (cfg.eqs[item[cfg.campoId]] || []).map(normalizar),
      descNorm: normalizar(item[cfg.campoDesc] || ''),
      modoNorm: normalizar(item.modo || item.modulo || ''),
    }))
  );
}

//cache de indices por cliente para no reconstruir cada busqueda
const INDICES = {};
const getIndice = cliente => {
  if (!INDICES[cliente]) INDICES[cliente] = construirIndice(cliente);
  return INDICES[cliente];
};

//convierte score al nivel de confianza visual
const getConfidenceLevel = score => score >= 85 ? 'high' : score >= 60 ? 'med' : 'low';

//poblar selector de grupos segun cliente activo
function poblarGrupos(cliente) {
  const cfg = CLIENTES[cliente];
  const sel = document.getElementById('selGrupo');
  const label = document.getElementById('labelGrupo');
  label.textContent = cfg.tipoGrupo;

  const grupos = Object.keys(cfg.datos);
  const todoLabel = `TODOS LOS ${cfg.tipoGrupo.toUpperCase()}S`;

  sel.innerHTML = `<option value="">${todoLabel}</option>`
    + grupos.map(g => `<option value="${g}">${g}</option>`).join('');
}

//actualizar cabecera y footer con cliente activo
function actualizarUI(cliente) {
  const cfg = CLIENTES[cliente];
  document.getElementById('tituloMotor').textContent = `MOTOR SEMANTICO — ${cfg.label}`;
  document.getElementById('footerMotor').textContent =
    `Motor Semantico ${cfg.label} · ${cfg.totalCodigos} codigos de falla · Jabil 2026`;
  document.getElementById('txtDesc').placeholder = cfg.promptPlaceholder;
}

//limpiar estado de busqueda e historial al cambiar cliente
function limpiarEstado() {
  document.getElementById('txtDesc').value = '';
  document.getElementById('sugerencias').innerHTML = '';
  document.getElementById('historial').innerHTML =
    '<div class="info-placeholder" style="padding:1rem;">Sin capturas</div>';
  historial = [];
  clearSelection();
}

//cambio de cliente
function onClienteChange() {
  clienteActivo = document.getElementById('sel-cliente').value;
  poblarGrupos(clienteActivo);
  actualizarUI(clienteActivo);
  limpiarEstado();
}

//cambio de grupo
function onGrupoChange() {
  document.getElementById('txtDesc').value = '';
  document.getElementById('sugerencias').innerHTML = '';
  clearSelection();
}

function onDescChange() {
  const input = normalizar(document.getElementById('txtDesc').value.trim());
  const grupo = document.getElementById('selGrupo').value;
  if (input.length < MIN_INPUT) {
    document.getElementById('sugerencias').innerHTML = '';
    return;
  }
  buscar(input, grupo);
}

//busqueda 3 niveles: exacta 100, parcial por palabras 75, fuzzy desc/modo 50
function buscar(input, grupo) {
  const indice = getIndice(clienteActivo);
  const candidatos = grupo ? indice.filter(c => c._grupo === grupo) : indice;
  const inputWords = input.split(/\s+/).filter(w => w.length >= MIN_INPUT);
  const scores = [];

  candidatos.forEach(item => {
    let score = 0;
    let matched = 0;

    //nivel 1: match exacto en equivalencias
    if (item.eqsNorm.some(eq => eq === input)) {
      score = SCORE_EXACTA;
      matched = inputWords.length;
    } else {
      //nivel 2: match parcial por palabras contra equivalencias
      matched = inputWords.filter(w =>
        item.eqsNorm.some(eq => eq.split(' ').some(e => e.includes(w)))
      ).length;
      if (matched > 0) {
        score = SCORE_PARCIAL;
      } else if (item.descNorm.includes(input) || item.modoNorm.includes(input)) {
        //nivel 3: fuzzy en descripcion o modo
        score = SCORE_FUZZY;
      }
    }

    if (score > 0) scores.push({ ...item, score, matched });
  });

  scores.sort((a, b) => b.score - a.score || b.matched - a.matched || a._id.localeCompare(b._id));
  mostrar(scores.slice(0, TOP_N));
}

function mostrar(matches) {
  const container = document.getElementById('sugerencias');
  if (!matches.length) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;">Sin coincidencias</div>';
    return;
  }
  container.innerHTML = matches.map(entry => {
    const cl = getConfidenceLevel(entry.score);
    const grupoInfo = entry._grupo ? `<div class="match-meta">${entry._grupo}</div>` : '';
    const accionHtml = entry.accion
      ? `<div class="match-accion">${entry.accion}</div>`
      : (clienteActivo !== 'DEXCOM' ? '<div class="match-accion pendiente">accion correctiva: pendiente de definir</div>' : '');
    const descHtml = clienteActivo === 'DEXCOM'
      ? `<div class="match-desc">${entry._desc}</div>`
      : `<div class="match-causa">${entry._desc}</div>`;
    return `<div class="match-item" data-id="${entry._id}" data-score="${entry.score}">
      <div class="match-code">${entry._id}</div>
      ${descHtml}
      ${accionHtml}
      ${grupoInfo}
      <div class="match-conf conf-${cl}">${entry.score}% confianza</div>
    </div>`;
  }).join('');
}

function seleccionarCodigo(id, score) {
  const indice = getIndice(clienteActivo);
  const item = indice.find(c => c._id === id);
  if (!item) return;
  seleccion = { id, desc: item._desc, grupo: item._grupo, score };
  document.getElementById('btnGuardar').disabled = false;
  const cl = getConfidenceLevel(score);
  document.getElementById('infoBox').innerHTML =
    `<div class="info-code">${id}</div>
     <div class="info-desc">${item._desc}</div>
     <div class="info-desc">${item._grupo}</div>
     <div class="info-conf conf-${cl}">${score}% confianza</div>`;
}

function clearSelection() {
  seleccion = null;
  document.getElementById('btnGuardar').disabled = true;
  document.getElementById('infoBox').innerHTML =
    '<div class="info-placeholder info-selected">Selecciona una sugerencia</div>';
}

function guardar() {
  if (!seleccion) return;
  const desc = document.getElementById('txtDesc').value;
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  historial.unshift({ id: seleccion.id, desc, score: seleccion.score, grupo: seleccion.grupo, cliente: clienteActivo, time: ts });
  if (historial.length > MAX_HISTORIAL) historial = historial.slice(0, MAX_HISTORIAL);
  actualizarHist();
  document.getElementById('txtDesc').value = '';
  document.getElementById('sugerencias').innerHTML = '';
  clearSelection();
}

function actualizarHist() {
  const container = document.getElementById('historial');
  if (!historial.length) {
    container.innerHTML = '<div class="info-placeholder" style="padding:1rem;">Sin capturas</div>';
    return;
  }
  container.innerHTML = historial.map(h =>
    `<div class="hist-item">
       <div class="hist-code">${h.id}</div>
       <div class="hist-text">"${h.desc}" [${h.grupo}] ${h.cliente}</div>
       <div class="hist-meta">${h.time} | ${h.score}% confianza</div>
     </div>`
  ).join('');
}

//event listeners
document.getElementById('sel-cliente').addEventListener('change', onClienteChange);
document.getElementById('selGrupo').addEventListener('change', onGrupoChange);
document.getElementById('txtDesc').addEventListener('input', onDescChange);
document.getElementById('btnGuardar').addEventListener('click', guardar);

//event delegation para match-item
document.addEventListener('click', e => {
  const matchItem = e.target.closest('.match-item');
  if (!matchItem) return;
  seleccionarCodigo(matchItem.dataset.id, parseInt(matchItem.dataset.score));
});

//inicializar con DEXCOM al cargar
poblarGrupos('DEXCOM');
actualizarUI('DEXCOM');
</script>
